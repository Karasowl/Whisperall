<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STT Overlay</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: transparent;
        font-family: "Segoe UI", Arial, sans-serif;
        -webkit-user-select: none;
      }
      .overlay {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(4, 10, 20, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 12px 32px rgba(2, 6, 23, 0.35);
        color: #e2e8f0;
        -webkit-app-region: drag;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 12px rgba(34, 197, 94, 0.6);
        flex-shrink: 0;
      }
      .overlay[data-state="transcribing"] .dot {
        background: #f97316;
        box-shadow: 0 0 12px rgba(249, 115, 22, 0.6);
      }
      .bars {
        display: inline-flex;
        align-items: flex-end;
        gap: 3px;
        height: 18px;
      }
      .bar {
        width: 3px;
        height: 6px;
        border-radius: 2px;
        background: #38bdf8;
        opacity: 0.9;
        transition: height 0.08s ease;
      }
      .status {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #94a3b8;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay" data-state="listening">
      <div class="dot"></div>
      <div class="bars" id="bars">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <div class="status" id="status">Listening</div>
    </div>

    <script>
      (function () {
        const overlay = document.getElementById('overlay');
        const statusEl = document.getElementById('status');
        const bars = Array.from(document.querySelectorAll('.bar'));
        let level = 0;

        const clamp = (value) => Math.min(1, Math.max(0, value));

        const setState = (next) => {
          const state = next === 'transcribing' ? 'transcribing' : 'listening';
          overlay.dataset.state = state;
          statusEl.textContent = state === 'transcribing' ? 'Transcribing' : 'Listening';
        };

        const updateBars = () => {
          const time = Date.now() / 140;
          const base = clamp(level * 1.6);
          bars.forEach((bar, index) => {
            const wobble = (Math.sin(time + index * 0.7) + 1) / 2;
            const amp = clamp(base + wobble * 0.2);
            const height = 4 + amp * 14;
            bar.style.height = `${height}px`;
          });
        };

        if (window.electronAPI?.onSttOverlayLevel) {
          window.electronAPI.onSttOverlayLevel((nextLevel) => {
            level = clamp(Number(nextLevel) || 0);
          });
        }

        if (window.electronAPI?.onSttOverlayState) {
          window.electronAPI.onSttOverlayState((state) => {
            setState(state);
          });
        }

        setState('listening');
        setInterval(updateBars, 50);
      })();
    </script>
  </body>
</html>
