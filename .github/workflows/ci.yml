name: CI

on:
  push:
    branches: [rewrite-monorepo, main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 -q
        env:
          SUPABASE_JWT_SECRET: test-secret
          AUTH_DISABLED: "false"

  ts-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check desktop
        run: pnpm --filter @whisperall/desktop run typecheck
      - name: Unit tests (api-client)
        run: pnpm --filter @whisperall/api-client exec vitest run --coverage
      - name: Unit tests (desktop)
        run: pnpm --filter @whisperall/desktop exec vitest run --coverage
      - name: Build desktop
        run: pnpm --filter @whisperall/desktop run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: ts-tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @whisperall/desktop exec playwright install chromium --with-deps
      - name: Run Playwright E2E
        run: pnpm --filter @whisperall/desktop run test:e2e
