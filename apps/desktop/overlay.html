<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' data: blob:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https://*.supabase.co wss://*.supabase.co https://api.deepgram.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />
    <title>Whisperall Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
      html, body, #root {
        width: 100%; height: 100%;
        background: transparent !important;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
      }
    </style>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('whisperall-settings') || '{}');
        var t = s.theme || 'dark';
        var r = t === 'system'
          ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.className = r;
      } catch(e) { document.documentElement.classList.add('dark'); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay/main.tsx"></script>
  </body>
</html>
